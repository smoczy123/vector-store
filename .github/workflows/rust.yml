name: Rust

on:
  push:
    branches:
    - 'master'

  pull_request:
    branches:
    - 'master'

  merge_group:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: full

jobs:
  cargo-clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        components: clippy

    - name: Print rustc version
      run: rustc --version

    - name: Print cargo-clippy version
      run: cargo clippy --version

    - name: Run cargo-clippy checks
      run: cargo clippy --all-targets --workspace -- -Dwarnings

    - name: Run cargo-clippy checks for test-hooks feature flag
      run: cargo clippy --features slow-test-hooks --all-targets --workspace -- -Dwarnings

  cargo-fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        components: rustfmt

    - name: Print rustc version
      run: rustc --version

    - name: Print cargo-fmt version
      run: cargo fmt --version

    - name: Run cargo-fmt checks
      run: cargo fmt --all --check

  cargo-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

    - name: Print rustc version
      run: rustc --version

    - name: Run cargo-test checks
      run: cargo test --features dev-tools,slow-test-hooks --verbose --all-targets --workspace

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

    - name: Setup cargo-deny
      uses: taiki-e/install-action@894ed6ded408bba4b650a982305dc5353e661648 # cargo-deny

    - name: Print cargo-deny version
      run: cargo deny --version

    - name: Run cargo-deny checks
      run: cargo deny check

  cargo-machete:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

    - name: Setup cargo-machete
      uses: taiki-e/install-action@d56616f1be134d33d513c59d577b2c0142b64a83 # cargo-machete

    - name: Print cargo-machete version
      run: cargo machete --version

    - name: Run cargo-machete checks
      run: cargo machete

  cargo-sbom:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

    - name: Setup cargo-cyclonedx
      uses: taiki-e/install-action@4fb4bfc098655bcd1461f113b03ff34ffb480d16 # cargo-cyclonedx

    - name: Print cargo-cyclonedx version
      run: cargo cyclonedx --version

    - name: Generate SBOM
      run: cargo cyclonedx --manifest-path crates/vector-store/Cargo.toml --format json

    - name: Validate SBOM
      run: |
        file=crates/vector-store/vector-store.cdx.json
        [[ -s $file ]] || { echo "SBOM file is empty"; exit 1; }
        python3 -c "import json; json.load(open('$file'))"

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: sbom
        path: crates/vector-store/vector-store.cdx.json
        retention-days: 7

  rust-workflow-status:
    needs: ["cargo-clippy", "cargo-fmt", "cargo-test", "cargo-deny", "cargo-machete", "cargo-sbom"]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check workflow status
      run: |
        return_code=0

        if [[ "${{ needs.cargo-clippy.result }}" == "failure" ]]; then
          echo "cargo-clippy job failed"
          return_code=1
        fi

        if [[ "${{ needs.cargo-fmt.result }}" == "failure" ]]; then
          echo "cargo-fmt job failed"
          return_code=1
        fi

        if [[ "${{ needs.cargo-test.result }}" == "failure" ]]; then
          echo "cargo-test job failed"
          return_code=1
        fi

        if [[ "${{ needs.cargo-deny.result }}" == "failure" ]]; then
          echo "cargo-deny job failed"
          return_code=1
        fi

        if [[ "${{ needs.cargo-machete.result }}" == "failure" ]]; then
          echo "cargo-machete job failed"
          return_code=1
        fi

        if [[ "${{ needs.cargo-sbom.result }}" == "failure" ]]; then
          echo "cargo-sbom job failed"
          return_code=1
        fi

        if [[ $return_code -ne 0 ]]; then
          exit $return_code
        fi

        echo "All jobs succeeded"

